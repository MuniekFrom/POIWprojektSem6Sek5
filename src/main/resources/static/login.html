<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

<div class="login-wrapper">
    <a href="/index.html" class="back-link">← Powrót na stronę główną</a>

    <div class="container">
        <h1>Logowanie</h1>

        <form id="loginForm">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Wpisz email" required>
            </div>

            <div>
                <label for="password">Hasło</label>
                <input type="password" id="password" placeholder="Wpisz hasło" required>
            </div>

            <button type="submit">Zaloguj</button>
        </form>

        <p class="auth-switch">
            Nie masz konta?
            <a href="/register.html">Zarejestruj się</a>
        </p>

        <p id="errorMessage"></p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>
