<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — ZapisyDoLekarza</title>

    <link rel="preload" as="image" href="/images/alpine-hero-wide.png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body class="auth-body login-page">
<div class="auth-wrapper">
    <a href="/index.html" class="auth-back-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Powrót
    </a>

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-mark">+</div>
            <div>
                <div class="auth-logo-text">ZapisyDoLekarza</div>
                <div class="auth-logo-sub">System rezerwacji wizyt</div>
            </div>
        </div>

        <div class="role-hint">
            <div class="role-chip patient">🏥 Pacjent</div>
            <div class="role-chip doctor">🩺 Lekarz</div>
            <div class="role-chip admin">⚙️ Admin</div>
        </div>

        <h1>Witaj z powrotem</h1>
        <p class="auth-subtitle">Zaloguj się, aby zarządzać swoimi wizytami.</p>

        <form id="loginForm">
            <div class="field">
                <label for="email">Adres email</label>
                <input type="email" id="email" placeholder="twoj@email.pl" required autocomplete="email">
            </div>

            <div class="field">
                <label for="password">Hasło</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn">Zaloguj się →</button>
        </form>

        <p id="errorMessage"></p>

        <div class="divider"><span>lub</span></div>

        <p class="switch">
            Nie masz konta?
            <a href="/register.html">Zarejestruj się bezpłatnie</a>
        </p>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
