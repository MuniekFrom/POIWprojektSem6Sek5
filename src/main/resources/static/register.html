<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja — ZapisyDoLekarza</title>

    <link rel="preload" as="image" href="/images/alpine-office.png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body class="auth-body register-page">
<div class="auth-wrapper register-wrapper">
    <a href="/index.html" class="auth-back-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Powrót
    </a>

    <div class="auth-card register-card">
        <div class="auth-logo">
            <div class="auth-logo-mark">+</div>
            <div>
                <div class="auth-logo-text">ZapisyDoLekarza</div>
                <div class="auth-logo-sub">Utwórz nowe konto</div>
            </div>
        </div>

        <h1>Dołącz do systemu</h1>
        <p class="auth-subtitle">Wybierz swoją rolę i uzupełnij dane.</p>

        <div class="tabs">
            <button type="button" id="patientTab" class="tab-btn active patient">🏥 Pacjent</button>
            <button type="button" id="doctorTab" class="tab-btn doctor">🩺 Lekarz</button>
        </div>

        <form id="registerForm">
            <p class="section-label">Dane konta</p>

            <div class="field">
                <label for="email">Adres email</label>
                <input type="email" id="email" placeholder="twoj@email.pl" required autocomplete="email">
            </div>

            <div class="field">
                <label for="password">Hasło</label>
                <input type="password" id="password" placeholder="Min. 8 znaków" required autocomplete="new-password">
            </div>

            <p class="section-label">Dane osobowe</p>

            <div class="field-row">
                <div class="field">
                    <label for="firstName">Imię</label>
                    <input type="text" id="firstName" placeholder="Jan" required autocomplete="given-name">
                </div>

                <div class="field">
                    <label for="lastName">Nazwisko</label>
                    <input type="text" id="lastName" placeholder="Kowalski" required autocomplete="family-name">
                </div>
            </div>

            <div id="patientFields">
                <p class="section-label">Dane pacjenta</p>

                <div class="field">
                    <label for="pesel">PESEL</label>
                    <input type="text" id="pesel" placeholder="00000000000" autocomplete="off">
                </div>

                <div class="field">
                    <label for="phone">Numer telefonu</label>
                    <input type="text" id="phone" placeholder="+48 000 000 000" autocomplete="tel">
                </div>
            </div>

            <div id="doctorFields" class="hidden">
                <p class="section-label">Dane lekarza</p>

                <div class="field">
                    <label for="specialization">Specjalizacja</label>
                    <input type="text" id="specialization" placeholder="np. Kardiolog, Dermatolog…">
                </div>

                <div class="pending-box">
                    <span class="icon">⏳</span>
                    <span>Konto lekarza wymaga zatwierdzenia przez administratora przed pierwszym logowaniem.</span>
                </div>
            </div>

            <button type="submit" class="submit-btn patient-active" id="submitBtn">Utwórz konto →</button>
        </form>

        <p id="registerMessage"></p>

        <div class="divider"><span>masz już konto?</span></div>

        <p class="switch">
            <a href="/login.html">Zaloguj się</a>
        </p>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
